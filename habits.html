<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FML Hub — Tasks & Habits</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Share+Tech+Mono&display=swap');

/* ═══════════════════════════════════════════════
   THEME VARIABLES — change these to retheme everything
   ═══════════════════════════════════════════════ */
:root {
  --bg:        #1a0a0a;
  --bg2:       #140808;
  --sidebar:   #120606;
  --panel:     #241010;
  --panel2:    #2e1414;
  --panel3:    #381818;
  --border:    #3d1c1c;
  --accent:    #e8354a;
  --accent2:   #e8b84b;
  --accent3:   #4ade80;
  --accent4:   #60a5fa;
  --accent5:   #a78bfa;
  --text:      #f0dada;
  --text-dim:  #7a5555;
  --text-mid:  #c0a0a0;
  --white:     #fff5f5;
  --radius:    16px;
  --radius-sm: 10px;
  --shadow:    0 8px 32px #0008;
  /* Heatmap colours */
  --heat-0:    #2e1414;
  --heat-1:    #5c1a1a;
  --heat-2:    #9c2020;
  --heat-3:    #c82828;
  --heat-4:    #e8354a;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg2);
  color: var(--text);
  font-family: 'Nunito', sans-serif;
  min-height: 100vh;
  display: flex;
  overflow: hidden;
  height: 100vh;
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* ── SIDEBAR ── */
.sidebar {
  width: 72px;
  background: var(--sidebar);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px 0;
  gap: 6px;
  flex-shrink: 0;
  border-right: 1px solid var(--border);
  height: 100vh;
  overflow-y: auto;
}
.sidebar-logo {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px; font-weight: 900;
  color: var(--accent);
  letter-spacing: 0.1em;
  margin-bottom: 16px;
  writing-mode: vertical-rl;
  transform: rotate(180deg);
}
.nav-btn {
  width: 44px; height: 44px;
  border-radius: 12px; border: none;
  background: transparent; color: var(--text-dim);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 18px; transition: all 0.2s; position: relative;
}
.nav-btn:hover { background: var(--panel2); color: var(--text); }
.nav-btn.active { background: var(--accent); color: white; box-shadow: 0 4px 16px #e8354a55; }
.nav-btn .tooltip {
  position: absolute; left: 54px;
  background: var(--panel3); color: var(--text);
  font-size: 11px; font-family: 'Share Tech Mono', monospace;
  padding: 4px 8px; border-radius: 6px; white-space: nowrap;
  pointer-events: none; opacity: 0; transition: opacity 0.15s;
  border: 1px solid var(--border); z-index: 100;
}
.nav-btn:hover .tooltip { opacity: 1; }
.sidebar-spacer { flex: 1; }

/* ── MAIN ── */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; height: 100vh; }

/* ── TOPBAR ── */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 24px;
  background: var(--sidebar); border-bottom: 1px solid var(--border);
  flex-shrink: 0; gap: 12px;
}
.topbar-title { font-size: 18px; font-weight: 900; color: var(--white); }
.topbar-title span { color: var(--accent); }
.topbar-right { display: flex; gap: 10px; align-items: center; }

/* ── TABS ── */
.tab-bar {
  display: flex; gap: 4px;
  padding: 12px 24px 0;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  background: var(--sidebar);
}
.tab-btn {
  font-family: 'Nunito', sans-serif;
  font-size: 13px; font-weight: 800;
  padding: 8px 18px;
  border: none; border-radius: 10px 10px 0 0;
  cursor: pointer; transition: all 0.2s;
  background: transparent; color: var(--text-dim);
  border-bottom: 2px solid transparent;
  margin-bottom: -1px;
}
.tab-btn.active { color: var(--white); border-bottom-color: var(--accent); background: var(--panel2); }
.tab-btn:hover:not(.active) { color: var(--text-mid); background: var(--panel); }

/* ── CONTENT ── */
.content { flex: 1; overflow-y: auto; padding: 24px; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ── CARDS ── */
.card {
  background: var(--panel); border-radius: var(--radius);
  border: 1px solid var(--border); box-shadow: var(--shadow);
  overflow: hidden; margin-bottom: 16px;
}
.card-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px 10px;
}
.card-title { font-size: 13px; font-weight: 800; color: var(--text-mid); text-transform: uppercase; letter-spacing: 0.03em; }
.card-body { padding: 0 18px 18px; }

/* ── BUTTONS ── */
.btn-accent {
  background: var(--accent); color: white; border: none;
  border-radius: 10px; padding: 8px 16px;
  font-family: 'Nunito', sans-serif; font-size: 12px; font-weight: 800;
  cursor: pointer; transition: all 0.2s;
  box-shadow: 0 4px 12px #e8354a44;
}
.btn-accent:hover { filter: brightness(1.15); }
.btn-ghost {
  background: var(--panel2); color: var(--text-mid);
  border: 1px solid var(--border); border-radius: 10px;
  padding: 8px 16px; font-family: 'Nunito', sans-serif;
  font-size: 12px; font-weight: 700; cursor: pointer; transition: all 0.2s;
}
.btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
.btn-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
.icon-btn {
  background: none; border: none; cursor: pointer;
  font-size: 16px; color: var(--text-dim); padding: 4px;
  border-radius: 6px; transition: all 0.15s; line-height: 1;
}
.icon-btn:hover { background: var(--panel3); color: var(--text); }

/* ── INPUTS ── */
.cp-input {
  background: var(--panel2); border: 1px solid var(--border);
  color: var(--text); font-family: 'Nunito', sans-serif;
  font-size: 13px; padding: 9px 12px; border-radius: 10px;
  outline: none; width: 100%; transition: border-color 0.2s;
}
.cp-input:focus { border-color: var(--accent); }
.cp-input::placeholder { color: var(--text-dim); }
.cp-select {
  background: var(--panel2); border: 1px solid var(--border);
  color: var(--text); font-family: 'Nunito', sans-serif;
  font-size: 12px; padding: 8px 10px; border-radius: 10px;
  outline: none; cursor: pointer;
}
.input-row { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
.input-label { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--text-dim); letter-spacing: 0.08em; }

/* ── MODAL ── */
.modal-overlay {
  display: none; position: fixed; inset: 0;
  background: #14080acc; z-index: 200;
  align-items: center; justify-content: center;
  padding: 20px; backdrop-filter: blur(6px);
}
.modal-overlay.active { display: flex; }
.modal {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: 20px; max-width: 460px; width: 100%;
  max-height: 85vh; overflow-y: auto;
  box-shadow: 0 24px 80px #0009;
  position: relative;
}
.modal::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 20px 20px 0 0;
}
.modal-header {
  padding: 18px 20px 12px;
  border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
}
.modal-title { font-size: 14px; font-weight: 800; color: var(--white); }
.modal-close {
  background: var(--panel2); border: 1px solid var(--border);
  color: var(--text-dim); font-size: 14px; cursor: pointer;
  width: 28px; height: 28px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
}
.modal-close:hover { border-color: var(--accent); color: var(--accent); }
.modal-body { padding: 18px 20px; }

/* ══════════════════════════════
   TO-DO STYLES
   ══════════════════════════════ */
.todo-toolbar {
  display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center;
}
.filter-chip {
  font-family: 'Share Tech Mono', monospace; font-size: 10px;
  padding: 5px 12px; border-radius: 20px;
  border: 1px solid var(--border); background: var(--panel2);
  color: var(--text-dim); cursor: pointer; transition: all 0.2s;
  letter-spacing: 0.05em;
}
.filter-chip.active { border-color: var(--accent); color: var(--accent); background: #e8354a18; }
.filter-chip:hover:not(.active) { border-color: var(--text-dim); color: var(--text-mid); }

.todo-list { list-style: none; }
.todo-item {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 12px; background: var(--panel2);
  border-radius: var(--radius-sm); margin-bottom: 8px;
  border: 1px solid var(--border); transition: all 0.2s;
  animation: slideIn 0.2s ease both;
}
@keyframes slideIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
.todo-item:hover { border-color: var(--border); }
.todo-item.done { opacity: 0.5; }
.todo-item.done .todo-title { text-decoration: line-through; color: var(--text-dim); }

.todo-check {
  width: 22px; height: 22px; border-radius: 6px;
  border: 2px solid var(--border); background: transparent;
  cursor: pointer; flex-shrink: 0; margin-top: 1px;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; font-size: 12px;
}
.todo-check:hover { border-color: var(--accent3); }
.todo-item.done .todo-check { background: var(--accent3); border-color: var(--accent3); color: var(--bg2); }

.todo-icon-wrap {
  width: 32px; height: 32px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0; overflow: hidden;
}
.todo-icon-wrap img { width: 100%; height: 100%; object-fit: cover; border-radius: 6px; }

.todo-content { flex: 1; min-width: 0; }
.todo-title { font-size: 13px; font-weight: 700; color: var(--white); line-height: 1.3; }
.todo-meta {
  display: flex; gap: 8px; margin-top: 4px; flex-wrap: wrap; align-items: center;
}
.todo-cat {
  font-family: 'Share Tech Mono', monospace; font-size: 9px;
  padding: 2px 7px; border-radius: 10px;
  font-weight: 700; letter-spacing: 0.05em;
}
.cat-uni    { background: #a78bfa22; border: 1px solid #a78bfa44; color: var(--accent5); }
.cat-work   { background: #e8b84b22; border: 1px solid #e8b84b44; color: var(--accent2); }
.cat-personal { background: #60a5fa22; border: 1px solid #60a5fa44; color: var(--accent4); }
.cat-health { background: #4ade8022; border: 1px solid #4ade8044; color: var(--accent3); }
.cat-other  { background: #ffffff11; border: 1px solid #ffffff22; color: var(--text-dim); }

.todo-due {
  font-family: 'Share Tech Mono', monospace; font-size: 9px; color: var(--text-dim);
}
.todo-due.overdue { color: var(--accent); }
.todo-due.soon    { color: var(--accent2); }

.todo-actions { display: flex; gap: 4px; flex-shrink: 0; opacity: 0; transition: opacity 0.15s; }
.todo-item:hover .todo-actions { opacity: 1; }

.priority-dot {
  width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 6px;
}
.p-high   { background: var(--accent); box-shadow: 0 0 6px #e8354a88; }
.p-medium { background: var(--accent2); }
.p-low    { background: var(--text-dim); }

/* ── ICON PICKER ── */
.icon-picker-grid {
  display: grid; grid-template-columns: repeat(8, 1fr); gap: 5px; margin: 8px 0;
}
.icon-opt {
  width: 34px; height: 34px; border-radius: 8px;
  border: 1px solid var(--border); background: var(--panel2);
  font-size: 17px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.icon-opt:hover, .icon-opt.selected { border-color: var(--accent); background: #e8354a22; }

/* ══════════════════════════════
   HABIT STYLES
   ══════════════════════════════ */
.habit-card {
  background: var(--panel); border-radius: var(--radius);
  border: 1px solid var(--border); margin-bottom: 16px;
  overflow: hidden;
}
.habit-header {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 18px 10px;
}
.habit-icon-wrap {
  width: 38px; height: 38px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; flex-shrink: 0; overflow: hidden;
}
.habit-icon-wrap img { width:100%; height:100%; object-fit:cover; border-radius:8px; }
.habit-info { flex: 1; }
.habit-name { font-size: 14px; font-weight: 800; color: var(--white); }
.habit-streak {
  font-family: 'Share Tech Mono', monospace; font-size: 10px;
  color: var(--accent2); margin-top: 2px;
}
.habit-body { padding: 0 18px 14px; }

/* Today check */
.habit-today {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 12px;
}
.habit-check-btn {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 14px; border-radius: 20px;
  border: 1px solid var(--border); background: var(--panel2);
  cursor: pointer; font-family: 'Nunito', sans-serif;
  font-size: 12px; font-weight: 700; color: var(--text-dim);
  transition: all 0.2s;
}
.habit-check-btn.done { background: var(--accent3); border-color: var(--accent3); color: var(--bg2); }
.habit-check-btn:not(.done):hover { border-color: var(--accent3); color: var(--accent3); }

/* Heatmap */
.heatmap-wrap { overflow-x: auto; padding-bottom: 4px; }
.heatmap {
  display: flex; gap: 3px; align-items: flex-end;
}
.heatmap-month { display: flex; flex-direction: column; gap: 2px; }
.heatmap-month-label {
  font-family: 'Share Tech Mono', monospace; font-size: 8px;
  color: var(--text-dim); text-align: center; margin-bottom: 3px;
  letter-spacing: 0.05em;
}
.heatmap-weeks { display: flex; gap: 2px; }
.heatmap-week { display: flex; flex-direction: column; gap: 2px; }
.heatmap-day {
  width: 11px; height: 11px; border-radius: 2px;
  background: var(--heat-0); cursor: pointer;
  transition: transform 0.1s;
  position: relative;
}
.heatmap-day:hover { transform: scale(1.3); z-index: 5; }
.heatmap-day[data-level="1"] { background: var(--heat-1); }
.heatmap-day[data-level="2"] { background: var(--heat-2); }
.heatmap-day[data-level="3"] { background: var(--heat-3); }
.heatmap-day[data-level="4"] { background: var(--heat-4); }
.heatmap-day.today-cell { outline: 2px solid var(--white); outline-offset: 1px; }
.heatmap-day.future { background: transparent !important; cursor: default; }

/* Heatmap tooltip */
.hm-tooltip {
  position: fixed; z-index: 999;
  background: var(--panel3); border: 1px solid var(--border);
  border-radius: 6px; padding: 4px 8px;
  font-family: 'Share Tech Mono', monospace; font-size: 10px;
  color: var(--text); pointer-events: none;
  display: none; white-space: nowrap;
}

/* Stats row */
.habit-stats-row {
  display: flex; gap: 8px; margin-top: 10px;
}
.habit-stat {
  flex: 1; background: var(--panel2); border-radius: 8px;
  padding: 8px; text-align: center; border: 1px solid var(--border);
}
.habit-stat-val { font-size: 18px; font-weight: 900; color: var(--white); }
.habit-stat-lbl { font-family: 'Share Tech Mono', monospace; font-size: 8px; color: var(--text-dim); margin-top: 2px; }

/* ── EMPTY ── */
.empty { text-align: center; padding: 40px 20px; color: var(--text-dim); }
.empty-icon { font-size: 40px; display: block; margin-bottom: 10px; opacity: 0.3; }
.empty-text { font-size: 14px; margin-bottom: 16px; }

/* ── MOBILE ── */
@media (max-width: 700px) {
  .sidebar { display: none; }
  .icon-picker-grid { grid-template-columns: repeat(6,1fr); }
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="sidebar-logo">NX</div>
  <a href="./index.html" style="text-decoration:none">
    <button class="nav-btn" title="Dashboard">🏠<span class="tooltip">Dashboard</span></button>
  </a>
  <button class="nav-btn active">✅<span class="tooltip">Tasks & Habits</span></button>
  <a href="https://duckytimesxx.github.io/Study.Guide/" target="_blank" style="text-decoration:none">
    <button class="nav-btn">📖<span class="tooltip">Study Guide</span></button>
  </a>
  <div class="sidebar-spacer"></div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <div class="topbar-title">FML Hub <span>// Tasks & Habits</span></div>
    <div class="topbar-right">
      <span id="live-clock" style="font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--text-dim)"></span>
    </div>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('todos')">✅ To-Do List</button>
    <button class="tab-btn" onclick="switchTab('habits')">🔥 Habit Tracker</button>
  </div>

  <div class="content">

    <!-- ══ TO-DO TAB ══ -->
    <div class="tab-panel active" id="tab-todos">

      <div class="card">
        <div class="card-header">
          <span class="card-title">Tasks</span>
          <button class="btn-accent" onclick="openTodoModal()">+ New Task</button>
        </div>
        <div class="card-body">
          <!-- Filters -->
          <div class="todo-toolbar">
            <button class="filter-chip active" onclick="setFilter('all',this)">All</button>
            <button class="filter-chip" onclick="setFilter('active',this)">Active</button>
            <button class="filter-chip" onclick="setFilter('done',this)">Done</button>
            <button class="filter-chip" onclick="setFilter('uni',this)">🎓 Uni</button>
            <button class="filter-chip" onclick="setFilter('work',this)">⏰ Work</button>
            <button class="filter-chip" onclick="setFilter('personal',this)">💙 Personal</button>
            <button class="filter-chip" onclick="setFilter('health',this)">💚 Health</button>
            <div style="flex:1"></div>
            <select class="cp-select" id="sort-select" onchange="renderTodos()" style="font-size:11px;padding:5px 8px">
              <option value="due">Sort: Due date</option>
              <option value="priority">Sort: Priority</option>
              <option value="created">Sort: Created</option>
              <option value="cat">Sort: Category</option>
            </select>
          </div>
          <!-- List -->
          <ul class="todo-list" id="todo-list"></ul>
          <div class="empty" id="todo-empty" style="display:none">
            <span class="empty-icon">✅</span>
            <div class="empty-text">No tasks here</div>
            <button class="btn-accent" onclick="openTodoModal()">Add your first task</button>
          </div>
        </div>
      </div>

    </div>

    <!-- ══ HABITS TAB ══ -->
    <div class="tab-panel" id="tab-habits">

      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
        <div style="font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--text-dim)">
          Track daily habits · click today's square or the check button to log
        </div>
        <button class="btn-accent" onclick="openHabitModal()">+ New Habit</button>
      </div>

      <div id="habit-list"></div>

      <div class="empty" id="habit-empty" style="display:none">
        <span class="empty-icon">🔥</span>
        <div class="empty-text">No habits tracked yet</div>
        <button class="btn-accent" onclick="openHabitModal()">Add your first habit</button>
      </div>

    </div>

  </div>
</div>

<!-- HEATMAP TOOLTIP -->
<div class="hm-tooltip" id="hm-tooltip"></div>

<!-- TODO MODAL -->
<div class="modal-overlay" id="todoModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="todo-modal-title">New Task</span>
      <button class="modal-close" onclick="closeTodoModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="input-row">
        <label class="input-label">TASK NAME</label>
        <input class="cp-input" id="todo-name" placeholder="What needs doing?"/>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px">
        <div class="input-row" style="margin:0">
          <label class="input-label">CATEGORY</label>
          <select class="cp-select" id="todo-cat" style="width:100%">
            <option value="uni">🎓 Uni</option>
            <option value="work">⏰ Work</option>
            <option value="personal">💙 Personal</option>
            <option value="health">💚 Health</option>
            <option value="other">⬜ Other</option>
          </select>
        </div>
        <div class="input-row" style="margin:0">
          <label class="input-label">PRIORITY</label>
          <select class="cp-select" id="todo-priority" style="width:100%">
            <option value="high">🔴 High</option>
            <option value="medium" selected>🟡 Medium</option>
            <option value="low">⚪ Low</option>
          </select>
        </div>
      </div>
      <div class="input-row">
        <label class="input-label">DUE DATE (optional)</label>
        <input class="cp-input" id="todo-due" type="date"/>
      </div>
      <div class="input-row">
        <label class="input-label">NOTES (optional)</label>
        <input class="cp-input" id="todo-notes" placeholder="Any extra details..."/>
      </div>

      <!-- Icon picker -->
      <div class="input-label" style="margin-bottom:6px;margin-top:4px">ICON</div>
      <div class="icon-picker-grid" id="todo-icon-grid"></div>
      <div style="display:flex;gap:8px;align-items:center;margin-top:6px;flex-wrap:wrap">

        <label class="btn-ghost" style="font-size:11px;padding:7px 10px;cursor:pointer">
          Upload image<input type="file" accept="image/*" style="display:none" onchange="handleTodoIconUpload(this)"/>

        <button class="btn-accent" onclick="saveTodo()">Save Task</button>
        <button class="btn-ghost" onclick="closeTodoModal()">Cancel</button>
      </div>
    </div>
  </div>
</div>

<!-- HABIT MODAL -->

        <label class="input-label">TARGET — days per week</label>

          <option value="7">Every day</option>

      <div class="input-label" style="margin-bottom:6px;margin-top:4px">ICON</div>

        <label class="btn-ghost" style="font-size:11px;padding:7px 10px;cursor:pointer">
          Upload image<input type="file" accept="image/*" style="display:none" onchange="handleHabitIconUpload(this)"/>
        </label>
        <img id="habit-icon-preview" style="display:none;width:32px;height:32px;border-radius:8px;object-fit:cover;border:1px solid var(--border)"/>

            style="-webkit-appearance:none;width:36px;height:36px;border:2px solid var(--border);border-radius:8px;background:none;cursor:pointer;padding:2px"/>
          <input class="cp-input" id="habit-color-text" value="#E8354A" maxlength="7"
            style="width:100px;font-family:'Share Tech Mono',monospace;font-size:11px"
            oninput="syncHabitColor(this.value)"/>
        </div>
      </div>

      <div id="habit-feedback" style="font-family:'Share Tech Mono',monospace;font-size:10px;min-height:16px;margin-top:8px"></div>

<script>
// ─── CLOCK ────────────────────────────────────────────────────────────────────
function updateClock() {
  const now = new Date();
  const el = document.getElementById('live-clock');
  if (el) el.textContent = now.toLocaleTimeString('en-AU',{hour12:false}) + '  ' +
    now.toLocaleDateString('en-AU',{weekday:'short',day:'2-digit',month:'short'});
}
setInterval(updateClock, 1000); updateClock();

// ─── TABS ────────────────────────────────────────────────────────────────────
function switchTab(id) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  event.target.classList.add('active');
}

// ─── ICON SETS ────────────────────────────────────────────────────────────────
const TODO_ICONS  = ['📝','🎓','📚','⏰','💙','💚','🏃','🧪','💡','📐','🖥','🎵','🎨','🍕','☕','🏋','🧘','📊','✈️','🎯','💰','🔬','⚙','🌐','📱','🗂','✏️','📌','🔑','⭐','🏠','🎮'];
const HABIT_ICONS = ['🔥','💪','🧘','🏃','📚','💧','🥗','😴','🧹','✍️','🎵','🌿','☀️','🧠','❤️','🎯','⚡','🌊','🏋','🍎','📓','🧴','🚴','🎸','🛁','🌙','☕','🥊','🎹','🤸','🧗','🏊'];

// ═══════════════════════════════════════════════
// TO-DO LIST
// ═══════════════════════════════════════════════
let todos = JSON.parse(localStorage.getItem('nexus_todos') || '[]');
let todoFilter = 'all';
let editingTodoId = null;
let todoDraft = { icon: '📝', iconType: 'emoji', iconData: null };
let selectedTodoIconIdx = 0;

function saveTodos() { localStorage.setItem('nexus_todos', JSON.stringify(todos)); }

function setFilter(f, el) {
  todoFilter = f;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderTodos();
}

function renderTodos() {
  const list = document.getElementById('todo-list');
  const empty = document.getElementById('todo-empty');
  const sort = document.getElementById('sort-select').value;

  let filtered = todos.filter(t => {
    if (todoFilter === 'all') return true;
    if (todoFilter === 'active') return !t.done;
    if (todoFilter === 'done') return t.done;
    return t.cat === todoFilter;
  });

  // Sort
  filtered.sort((a,b) => {
    if (sort === 'due') {
      if (!a.due && !b.due) return 0;
      if (!a.due) return 1; if (!b.due) return -1;
      return a.due.localeCompare(b.due);
    }
    if (sort === 'priority') {
      const p = {high:0,medium:1,low:2};
      return (p[a.priority]||1) - (p[b.priority]||1);
    }
    if (sort === 'cat') return (a.cat||'').localeCompare(b.cat||'');
    return (b.created||0) - (a.created||0);
  });

  if (!filtered.length) {
    list.innerHTML = ''; empty.style.display = 'block'; return;
  }
  empty.style.display = 'none';

  list.innerHTML = filtered.map(t => {
    const iconHTML = t.iconType === 'image' && t.iconData
      ? `<img src="${t.iconData}" alt=""/>`
      : (t.icon || '📝');
    const catClass = `cat-${t.cat||'other'}`;
    const catLabel = {uni:'🎓 Uni',work:'⏰ Work',personal:'💙 Personal',health:'💚 Health',other:'⬜ Other'}[t.cat]||'Other';
    const prioClass = `p-${t.priority||'medium'}`;

    let dueHTML = '';
    if (t.due) {
      const diff = (new Date(t.due) - new Date()) / 864e5;
      const cls = diff < 0 ? 'overdue' : diff <= 2 ? 'soon' : '';
      const label = diff < 0 ? 'Overdue' : diff < 1 ? 'Today' : diff < 2 ? 'Tomorrow' : `Due ${t.due}`;
      dueHTML = `<span class="todo-due ${cls}">${label}</span>`;
    }

    return `<li class="todo-item${t.done?' done':''}" id="todo-${t.id}">
      <div class="priority-dot ${prioClass}"></div>
      <div class="todo-check" onclick="toggleTodo('${t.id}')">${t.done?'✓':''}</div>
      <div class="todo-icon-wrap" style="background:${getCatColor(t.cat)}22;border:1px solid ${getCatColor(t.cat)}44">${iconHTML}</div>
      <div class="todo-content">
        <div class="todo-title">${t.name}</div>
        <div class="todo-meta">
          <span class="todo-cat ${catClass}">${catLabel}</span>
          ${dueHTML}
          ${t.notes?`<span style="font-family:'Share Tech Mono',monospace;font-size:9px;color:var(--text-dim)">${t.notes}</span>`:''}
        </div>
      </div>
      <div class="todo-actions">
        <button class="icon-btn" onclick="editTodo('${t.id}')" title="Edit">✏️</button>
        <button class="icon-btn" onclick="deleteTodo('${t.id}')" title="Delete">🗑</button>
      </div>
    </li>`;
  }).join('');
}

function getCatColor(cat) {
  return {uni:'#a78bfa',work:'#e8b84b',personal:'#60a5fa',health:'#4ade80',other:'#ffffff'}[cat]||'#ffffff';
}

function toggleTodo(id) {
  const t = todos.find(t => t.id === id);
  if (t) { t.done = !t.done; saveTodos(); renderTodos(); }
}

function deleteTodo(id) {
  todos = todos.filter(t => t.id !== id);
  saveTodos(); renderTodos();
}

function editTodo(id) {
  const t = todos.find(t => t.id === id);
  if (!t) return;
  editingTodoId = id;
  todoDraft = { icon: t.icon||'📝', iconType: t.iconType||'emoji', iconData: t.iconData||null };
  document.getElementById('todo-name').value = t.name;
  document.getElementById('todo-cat').value = t.cat||'uni';
  document.getElementById('todo-priority').value = t.priority||'medium';
  document.getElementById('todo-due').value = t.due||'';
  document.getElementById('todo-notes').value = t.notes||'';
  document.getElementById('todo-modal-title').textContent = 'Edit Task';
  const prev = document.getElementById('todo-icon-preview');
  if (t.iconType==='image'&&t.iconData) { prev.src=t.iconData; prev.style.display='block'; }
  else prev.style.display='none';
  renderTodoIconGrid();
  document.getElementById('todoModal').classList.add('active');
}

// Icon picker
function renderTodoIconGrid() {
  document.getElementById('todo-icon-grid').innerHTML = TODO_ICONS.map((ic,i) =>
    `<div class="icon-opt${ic===todoDraft.icon&&todoDraft.iconType==='emoji'?' selected':''}" onclick="selectTodoIcon('${ic}')">${ic}</div>`
  ).join('');
}
function selectTodoIcon(ic) {
  todoDraft.icon=ic; todoDraft.iconType='emoji'; todoDraft.iconData=null;
  document.getElementById('todo-icon-preview').style.display='none';
  renderTodoIconGrid();
}
function applyTodoEmoji() {
  const v = document.getElementById('todo-custom-emoji').value.trim();
  if (!v) return;
  todoDraft.icon=v; todoDraft.iconType='emoji'; todoDraft.iconData=null;
  renderTodoIconGrid();
}
function handleTodoIconUpload(input) {
  const file = input.files[0]; if (!file) return;
  const r = new FileReader();
  r.onload = e => {
    todoDraft.iconData=e.target.result; todoDraft.iconType='image';
    const prev=document.getElementById('todo-icon-preview');
    prev.src=e.target.result; prev.style.display='block';
    renderTodoIconGrid();
  };
  r.readAsDataURL(file);
}

function openTodoModal() {
  editingTodoId = null;
  todoDraft = { icon:'📝', iconType:'emoji', iconData:null };
  document.getElementById('todo-name').value='';
  document.getElementById('todo-cat').value='uni';
  document.getElementById('todo-priority').value='medium';
  document.getElementById('todo-due').value='';
  document.getElementById('todo-notes').value='';
  document.getElementById('todo-custom-emoji').value='';
  document.getElementById('todo-icon-preview').style.display='none';
  document.getElementById('todo-feedback').textContent='';
  document.getElementById('todo-modal-title').textContent='New Task';
  renderTodoIconGrid();
  document.getElementById('todoModal').classList.add('active');
}
function closeTodoModal() { document.getElementById('todoModal').classList.remove('active'); }

function saveTodo() {
  const name = document.getElementById('todo-name').value.trim();
  const fb = document.getElementById('todo-feedback');
  if (!name) { fb.style.color='var(--accent)'; fb.textContent='⚠ Enter a task name'; return; }
  const task = {
    id: editingTodoId || Date.now().toString(),
    name,
    cat:      document.getElementById('todo-cat').value,
    priority: document.getElementById('todo-priority').value,
    due:      document.getElementById('todo-due').value || null,
    notes:    document.getElementById('todo-notes').value.trim() || null,
    icon:     todoDraft.icon,
    iconType: todoDraft.iconType,
    iconData: todoDraft.iconData,
    done:     false,
    created:  Date.now(),
  };
  if (editingTodoId) {
    const idx = todos.findIndex(t => t.id === editingTodoId);
    if (idx >= 0) { task.done = todos[idx].done; task.created = todos[idx].created; todos[idx] = task; }
  } else {
    todos.unshift(task);
  }
  saveTodos(); renderTodos(); closeTodoModal();
}

// ═══════════════════════════════════════════════
// HABIT TRACKER
// ═══════════════════════════════════════════════
let habits = JSON.parse(localStorage.getItem('nexus_habits') || '[]');
let habitDraft = { icon:'🔥', iconType:'emoji', iconData:null };
let editingHabitId = null;

function saveHabits() { localStorage.setItem('nexus_habits', JSON.stringify(habits)); }

const todayStr = () => new Date().toISOString().split('T')[0];

function toggleHabitDay(habitId, dateStr) {
  const h = habits.find(h => h.id === habitId);
  if (!h) return;
  if (!h.log) h.log = {};
  if (h.log[dateStr]) delete h.log[dateStr];
  else h.log[dateStr] = 1;
  saveHabits(); renderHabits();
}

function calcStreak(log) {
  let streak = 0;
  const d = new Date();
  // Check today first — if not logged, start from yesterday
  if (!log[d.toISOString().split('T')[0]]) d.setDate(d.getDate()-1);
  while (true) {
    const ds = d.toISOString().split('T')[0];
    if (log[ds]) { streak++; d.setDate(d.getDate()-1); }
    else break;
  }
  return streak;
}

function calcTotal(log) { return Object.keys(log||{}).length; }

function renderHabits() {
  const list = document.getElementById('habit-list');
  const empty = document.getElementById('habit-empty');
  if (!habits.length) { list.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display='none';

  list.innerHTML = habits.map(h => {
    const log = h.log || {};
    const streak = calcStreak(log);
    const total = calcTotal(log);
    const today = todayStr();
    const doneTodayCSS = log[today] ? 'done' : '';
    const iconHTML = h.iconType==='image'&&h.iconData
      ? `<img src="${h.iconData}" alt=""/>`
      : (h.icon||'🔥');
    const col = h.color || 'var(--accent)';

    return `<div class="habit-card" id="habit-${h.id}">
      <div class="habit-header">
        <div class="habit-icon-wrap" style="background:${col}22;border:1px solid ${col}44">${iconHTML}</div>
        <div class="habit-info">
          <div class="habit-name">${h.name}</div>
          <div class="habit-streak" style="color:${col}">${streak > 0 ? '🔥 '+streak+' day streak' : 'Start your streak today!'}</div>
        </div>
        <div style="display:flex;gap:4px">
          <button class="icon-btn" onclick="editHabit('${h.id}')">✏️</button>
          <button class="icon-btn" onclick="deleteHabit('${h.id}')">🗑</button>
        </div>
      </div>
      <div class="habit-body">
        <div class="habit-today">
          <button class="habit-check-btn ${doneTodayCSS}" onclick="toggleHabitDay('${h.id}','${today}')">
            ${log[today] ? '✓ Done today' : '○ Mark today'}
          </button>
        </div>
        <div class="heatmap-wrap">${buildHeatmap(h)}</div>
        <div class="habit-stats-row">
          <div class="habit-stat"><div class="habit-stat-val" style="color:${col}">${streak}</div><div class="habit-stat-lbl">STREAK</div></div>
          <div class="habit-stat"><div class="habit-stat-val" style="color:${col}">${total}</div><div class="habit-stat-lbl">TOTAL DAYS</div></div>
          <div class="habit-stat"><div class="habit-stat-val" style="color:${col}">${calcThisWeek(log)}/7</div><div class="habit-stat-lbl">THIS WEEK</div></div>
          <div class="habit-stat"><div class="habit-stat-val" style="color:${col}">${calcCompletionRate(log)}%</div><div class="habit-stat-lbl">30-DAY RATE</div></div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function calcThisWeek(log) {
  let count = 0;
  const d = new Date();
  for (let i = 0; i < 7; i++) {
    if (log[d.toISOString().split('T')[0]]) count++;
    d.setDate(d.getDate()-1);
  }
  return count;
}

function calcCompletionRate(log) {
  let count = 0;
  const d = new Date();
  for (let i = 0; i < 30; i++) {
    if (log[d.toISOString().split('T')[0]]) count++;
    d.setDate(d.getDate()-1);
  }
  return Math.round(count/30*100);
}

function buildHeatmap(habit) {
  const log = habit.log || {};
  const today = new Date(); today.setHours(0,0,0,0);
  const todayStr2 = today.toISOString().split('T')[0];

  // Show last 6 months grouped by month
  const months = [];
  const startDate = new Date(today);
  startDate.setMonth(startDate.getMonth() - 5);
  startDate.setDate(1);

  let current = new Date(startDate);
  while (current <= today) {
    const monthKey = current.toLocaleDateString('en-AU',{month:'short',year:'2-digit'});
    if (!months.length || months[months.length-1].label !== monthKey) {
      months.push({ label: monthKey, days: [] });
    }
    const ds = current.toISOString().split('T')[0];
    const isFuture = current > today;
    const level = isFuture ? -1 : (log[ds] ? 4 : 0);
    months[months.length-1].days.push({ ds, level, isToday: ds === todayStr2, isFuture });
    current.setDate(current.getDate()+1);
  }

  let html = '<div class="heatmap">';
  months.forEach(month => {
    html += `<div class="heatmap-month">
      <div class="heatmap-month-label">${month.label}</div>
      <div class="heatmap-weeks">`;
    // Split into weeks (Sun-Sat)
    const weeks = [[]];
    month.days.forEach(day => {
      const dow = new Date(day.ds).getDay();
      if (weeks[weeks.length-1].length >= 7) weeks.push([]);
      // Pad first week
      if (weeks.length === 1 && weeks[0].length === 0) {
        for (let i = 0; i < dow; i++) weeks[0].push(null);
      }
      weeks[weeks.length-1].push(day);
    });
    weeks.forEach(week => {
      html += '<div class="heatmap-week">';
      week.forEach(day => {
        if (!day) { html += '<div class="heatmap-day" style="background:transparent"></div>'; return; }
        const cls = [
          'heatmap-day',
          day.isFuture ? 'future' : '',
          day.isToday ? 'today-cell' : '',
        ].filter(Boolean).join(' ');
        html += `<div class="${cls}" data-level="${day.level < 0 ? '' : day.level}" data-date="${day.ds}" data-habit="${habit.id}"
          onmouseenter="showHmTooltip(event,'${day.ds}',${!!log[day.ds]})"
          onmouseleave="hideHmTooltip()"
          onclick="${day.isFuture ? '' : `toggleHabitDay('${habit.id}','${day.ds}')`}"></div>`;
      });
      html += '</div>';
    });
    html += '</div></div>';
  });
  html += '</div>';
  return html;
}

function showHmTooltip(e, dateStr, done) {
  const tip = document.getElementById('hm-tooltip');
  const label = done ? '✓ Completed' : '✗ Not logged';
  tip.textContent = `${dateStr}  ${label}`;
  tip.style.display = 'block';
  tip.style.left = (e.clientX + 10) + 'px';
  tip.style.top  = (e.clientY - 28) + 'px';
}
function hideHmTooltip() { document.getElementById('hm-tooltip').style.display = 'none'; }

function deleteHabit(id) {
  if (!confirm('Delete this habit and all its history?')) return;
  habits = habits.filter(h => h.id !== id);
  saveHabits(); renderHabits();
}

// Habit icon
function renderHabitIconGrid() {
  document.getElementById('habit-icon-grid').innerHTML = HABIT_ICONS.map((ic,i) =>
    `<div class="icon-opt${ic===habitDraft.icon&&habitDraft.iconType==='emoji'?' selected':''}" onclick="selectHabitIcon('${ic}')">${ic}</div>`
  ).join('');
}
function selectHabitIcon(ic) {
  habitDraft.icon=ic; habitDraft.iconType='emoji'; habitDraft.iconData=null;
  document.getElementById('habit-icon-preview').style.display='none';
  renderHabitIconGrid();
}
function applyHabitEmoji() {
  const v = document.getElementById('habit-custom-emoji').value.trim();
  if (!v) return; habitDraft.icon=v; habitDraft.iconType='emoji'; habitDraft.iconData=null; renderHabitIconGrid();
}
function handleHabitIconUpload(input) {
  const file=input.files[0]; if (!file) return;
  const r=new FileReader(); r.onload=e=>{ habitDraft.iconData=e.target.result; habitDraft.iconType='image'; const p=document.getElementById('habit-icon-preview'); p.src=e.target.result; p.style.display='block'; renderHabitIconGrid(); }; r.readAsDataURL(file);
}
function syncHabitColor(val) {
  if (/^#[0-9A-Fa-f]{6}$/.test(val)) document.getElementById('habit-color').value = val;
}

function openHabitModal(id) {
  editingHabitId = id || null;
  if (id) {
    const h = habits.find(h => h.id === id);
    if (!h) return;
    habitDraft = { icon:h.icon||'🔥', iconType:h.iconType||'emoji', iconData:h.iconData||null };
    document.getElementById('habit-name').value = h.name;
    document.getElementById('habit-target').value = h.target||'7';
    document.getElementById('habit-color').value = h.color||'#e8354a';
    document.getElementById('habit-color-text').value = (h.color||'#e8354a').toUpperCase();
    document.getElementById('habit-modal-title').textContent = 'Edit Habit';
    const p=document.getElementById('habit-icon-preview');
    if(h.iconType==='image'&&h.iconData){p.src=h.iconData;p.style.display='block';}else p.style.display='none';
  } else {
    habitDraft = { icon:'🔥', iconType:'emoji', iconData:null };
    document.getElementById('habit-name').value='';
    document.getElementById('habit-target').value='7';
    document.getElementById('habit-color').value='#e8354a';
    document.getElementById('habit-color-text').value='#E8354A';
    document.getElementById('habit-modal-title').textContent='New Habit';
    document.getElementById('habit-icon-preview').style.display='none';
  }
  document.getElementById('habit-custom-emoji').value='';
  document.getElementById('habit-feedback').textContent='';
  renderHabitIconGrid();
  document.getElementById('habitModal').classList.add('active');
}
function editHabit(id) { openHabitModal(id); }
function closeHabitModal() { document.getElementById('habitModal').classList.remove('active'); }

function saveHabit() {
  const name = document.getElementById('habit-name').value.trim();
  const fb = document.getElementById('habit-feedback');
  if (!name) { fb.style.color='var(--accent)'; fb.textContent='⚠ Enter a habit name'; return; }
  const color = document.getElementById('habit-color').value;
  if (editingHabitId) {
    const h = habits.find(h => h.id === editingHabitId);
    if (h) { h.name=name; h.target=document.getElementById('habit-target').value; h.color=color; h.icon=habitDraft.icon; h.iconType=habitDraft.iconType; h.iconData=habitDraft.iconData; }
  } else {
    habits.push({ id: Date.now().toString(), name, target: document.getElementById('habit-target').value, color, icon: habitDraft.icon, iconType: habitDraft.iconType, iconData: habitDraft.iconData, log: {} });
  }
  saveHabits(); renderHabits(); closeHabitModal();
}

// ─── MODAL CLOSE ON BACKDROP ─────────────────────────────────────────────────
['todoModal','habitModal'].forEach(id => {
  const el = document.getElementById(id);
  if (el) el.addEventListener('click', e => { if (e.target === el) el.classList.remove('active'); });
});

// ─── INIT ─────────────────────────────────────────────────────────────────────
renderTodos();
renderHabits();
</script>
</body>
